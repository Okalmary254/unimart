{% extends 'store/admin/base.html' %}

{% block title %}Site Settings - MNU Store Admin{% endblock %}
{% block page_icon %}fas fa-cog{% endblock %}
{% block page_title %}Site Settings{% endblock %}

{% block content %}
<form method="post">
    {% csrf_token %}
    
    <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 2rem;">
        <!-- General Settings -->
        <div style="background: #f8f9fa; padding: 1.5rem; border-radius: 10px;">
            <h3 style="margin-bottom: 1.5rem; color: #333;"><i class="fas fa-globe" style="color: #667eea; margin-right: 0.5rem;"></i> General Settings</h3>
            
            <div class="form-group">
                <label><i class="fas fa-store"></i> Site Name</label>
                <input type="text" name="site_name" class="form-control" value="{{ settings.site_name }}">
            </div>
            
            <div class="form-group">
                <label><i class="fas fa-envelope"></i> Contact Email</label>
                <input type="email" name="contact_email" class="form-control" value="{{ settings.contact_email }}">
            </div>
            
            <div class="form-group">
                <label><i class="fas fa-phone"></i> Contact Phone</label>
                <input type="text" name="contact_phone" class="form-control" value="{{ settings.contact_phone }}">
            </div>
            
            <div class="form-group">
                <label><i class="fas fa-map-marker-alt"></i> Contact Address</label>
                <input type="text" name="contact_address" class="form-control" value="{{ settings.contact_address }}">
            </div>
            
            <div class="form-group">
                <label><i class="fas fa-clock"></i> Business Hours</label>
                <input type="text" name="business_hours" class="form-control" value="{{ settings.business_hours }}">
            </div>
        </div>
        
        <!-- Social Media Links -->
        <div style="background: #f8f9fa; padding: 1.5rem; border-radius: 10px;">
            <h3 style="margin-bottom: 1.5rem; color: #333;"><i class="fas fa-share-alt" style="color: #667eea; margin-right: 0.5rem;"></i> Social Media</h3>
            
            <div class="form-group">
                <label><i class="fab fa-facebook" style="color: #4267B2;"></i> Facebook URL</label>
                <input type="url" name="facebook" class="form-control" value="{{ settings.facebook }}" placeholder="https://facebook.com/yourpage">
            </div>
            
            <div class="form-group">
                <label><i class="fab fa-instagram" style="color: #E1306C;"></i> Instagram URL</label>
                <input type="url" name="instagram" class="form-control" value="{{ settings.instagram }}" placeholder="https://instagram.com/yourpage">
            </div>
            
            <div class="form-group">
                <label><i class="fab fa-twitter" style="color: #1DA1F2;"></i> Twitter URL</label>
                <input type="url" name="twitter" class="form-control" value="{{ settings.twitter }}" placeholder="https://twitter.com/yourpage">
            </div>
            
            <div class="form-group">
                <label><i class="fab fa-whatsapp" style="color: #25D366;"></i> WhatsApp Number</label>
                <input type="text" name="whatsapp" class="form-control" value="{{ settings.whatsapp }}" placeholder="https://wa.me/254700000000">
            </div>
        </div>
    </div>
    
    <div style="margin-top: 2rem; display: flex; gap: 1rem;">
        <button type="submit" class="btn btn-primary">
            <i class="fas fa-save"></i> Save Settings
        </button>
        <button type="reset" class="btn btn-outline">
            <i class="fas fa-undo"></i> Reset
        </button>
    </div>
</form>
{% endblock %}
